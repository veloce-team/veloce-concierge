services:
  caddy:
    image: caddy:2-alpine
    container_name: veloce-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - veloce-net

volumes:
  caddy_data:
  caddy_config:

networks:
  veloce-net:
    external: true
