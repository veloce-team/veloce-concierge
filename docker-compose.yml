services:
  caddy:
    image: caddy:2-alpine
    container_name: veloce-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./branding:/srv/branding:ro
      - /opt/veloce-site:/srv/veloce-site:ro
      - /opt/veloce-team/dist:/srv/veloce-team:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - veloce-net

  concierge-web:
    build: ./web
    container_name: veloce-concierge-web
    restart: unless-stopped
    env_file: ./web/.env
    volumes:
      - web_data:/data
    expose:
      - "3000"
    networks:
      - veloce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  caddy_data:
  caddy_config:
  web_data:

networks:
  veloce-net:
    external: true
